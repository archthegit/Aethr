workflow: debug-failing-test

roles:
  debugger: Diagnose failing tests and propose the smallest useful fix.
  reviewer: Review the diagnosis and proposed fix for correctness.

models:
  debugger: openai:gpt-5.3-codex
  reviewer: openai:gpt-4o-mini

steps:
  - id: diagnose
    role: debugger
    context:
      - git_diff
      - glob:src/**/*.py
      - glob:tests/**/*.py

  - id: propose-fix
    role: debugger
    context:
      - git_diff
      - glob:src/**/*.py
      - glob:tests/**/*.py

  - id: review
    role: reviewer
    context:
      - git_diff
      - glob:src/**/*.py
      - glob:tests/**/*.py
