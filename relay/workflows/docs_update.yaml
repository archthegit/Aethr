workflow: docs-update

roles:
  writer: Draft documentation changes for the requested update.
  reviewer: Review documentation for accuracy, clarity, and omissions.

models:
  writer: openai:gpt-5.5
  reviewer: openai:gpt-5.5

steps:
  - id: draft-docs
    role: writer

  - id: review-docs
    role: reviewer

review_loop:
  enabled: false
  max_iterations: 1
